# ============================================
# docker-compose.yml — Lokalne wdrożenie aplikacji TaskFlow
#
# Są 4 serwisy kontenerowe:
# 1. api       — Backend FastAPI (Python)
# 2. postgres  — Baza danych PostgreSQL
# 3. redis     — Cache Redis
# 4. nginx     — Reverse proxy Nginx
#
# Uruchomienie: docker-compose up -d
# Zatrzymanie:  docker-compose down
# Logi:         docker-compose logs -f
# ============================================

version: "3.9"

services:
  # --- Serwis 1: Backend API (FastAPI) ---
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: taskflow-api
    restart: unless-stopped
    environment:
      # Zmienne środowiskowe konfigurujące połączenie z bazą i Redis.
      # W Dockerze nazwy hostów odpowiadają nazwom serwisów (DNS wewnętrzny).
      - APP_NAME=TaskFlow
      - APP_VERSION=1.0.0
      - APP_ENV=development
      - APP_DEBUG=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=taskflow
      - POSTGRES_USER=taskflow_user
      - POSTGRES_PASSWORD=taskflow_secret_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000" # Dostęp do API bezpośrednio (dev/debug)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskflow-network
    # Ograniczono zasoby kontenera (symulacja limitów Kubernetes)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # --- Serwis 2: Baza danych PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=taskflow
      - POSTGRES_USER=taskflow_user
      - POSTGRES_PASSWORD=taskflow_secret_password
    ports:
      - "5432:5432" # Dostęp do bazy z hosta (dev/debug)
    volumes:
      # Zamontowano wolumin dla trwałości danych (dane przetrwają restart kontenera)
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U taskflow_user -d taskflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taskflow-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # --- Serwis 3: Cache Redis ---
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379" # Dostęp do Redis z hosta (dev/debug)
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskflow-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"

  # --- Serwis 4: Reverse Proxy Nginx ---
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    container_name: taskflow-nginx
    restart: unless-stopped
    ports:
      - "80:80" # Główny punkt wejścia aplikacji
    depends_on:
      api:
        condition: service_healthy
    networks:
      - taskflow-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

# --- Sieci ---
# Utworzono dedykowaną sieć bridge dla komunikacji między kontenerami.
# Kontenery rozwiązują nazwy serwisów przez wewnętrzny DNS Dockera.
networks:
  taskflow-network:
    driver: bridge
    name: taskflow-network

# --- Woluminy ---
# Zdefiniowano nazwane woluminy dla trwałości danych.
# Dane PostgreSQL i Redis przetrwają restart i usunięcie kontenerów.
volumes:
  postgres_data:
    name: taskflow-postgres-data
  redis_data:
    name: taskflow-redis-data
