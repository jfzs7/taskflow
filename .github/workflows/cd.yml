name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Budowanie i wypychanie obrazów do GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Logowanie do GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Konfiguracja małych liter dla nazwy repozytorium
      run: |
        echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Budowanie i wypychanie obrazu API
      uses: docker/build-push-action@v5
      with:
        context: ./src/api
        file: ./src/api/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/api:latest
          ghcr.io/${{ env.REPO_LOWER }}/api:${{ github.sha }}

    - name: Budowanie i wypychanie obrazu Nginx
      uses: docker/build-push-action@v5
      with:
        context: ./src/nginx
        file: ./src/nginx/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/nginx:latest
          ghcr.io/${{ env.REPO_LOWER }}/nginx:${{ github.sha }}
