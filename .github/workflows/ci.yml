name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Jakość kodu i Testy
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Instalacja zależności
      run: |
        python -m pip install --upgrade pip
        pip install -r src/api/requirements.txt

    - name: Sprawdzenie formatowania (black)
      run: |
        black src/ tests/ --line-length=120 --check

    - name: Analiza statyczna kodu (flake8)
      run: |
        flake8 src/ tests/ --max-line-length=120 --exclude=__pycache__,venv

    - name: Uruchomienie testów jednostkowych (pytest)
      run: |
        cd src/api
        python -m pytest ../../tests/ -v --cov=. --cov-report=term-missing

  docker-build:
    name: Weryfikacja budowania obrazów Docker
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Budowanie obrazu backendu API
      uses: docker/build-push-action@v5
      with:
        context: ./src/api
        file: ./src/api/Dockerfile
        push: false

    - name: Budowanie obrazu Nginx proxy
      uses: docker/build-push-action@v5
      with:
        context: ./src/nginx
        file: ./src/nginx/Dockerfile
        push: false
