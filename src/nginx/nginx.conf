# ============================================
# nginx.conf — Konfiguracja reverse proxy Nginx
#
# Skonfigurowano Nginx jako reverse proxy przekierowujący
# ruch HTTP do serwisu API FastAPI. Zastosowano upstream
# dla load balancingu i buforowanie odpowiedzi.
# ============================================

# Zdefiniowano pulę serwerów upstream (backend API)
upstream api_backend {
    # Przekierowano ruch do kontenera API na porcie 8000.
    # W Kubernetes nazwa serwisu jest rozwiązywana przez DNS klastra.
    server api:8000;
}

server {
    # Nasłuchiwano na porcie 80 (HTTP)
    listen 80;
    server_name localhost;

    # --- Ustawienia logowania ---
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- Ustawienia proxy ---
    # Przekazano oryginalne nagłówki klienta do backendu
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Timeouty ---
    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # --- Główna lokalizacja — proxy do API ---
    location / {
        proxy_pass http://api_backend;
    }

    # --- Health check Nginx ---
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # --- Ograniczenie rozmiaru przesyłanych danych ---
    client_max_body_size 10M;

    # --- Kompresja gzip ---
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
