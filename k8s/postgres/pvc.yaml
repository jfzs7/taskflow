# =======================================================
# pvc.yaml - Trwały wolumin dla bazy danych PostgreSQL
#
# Żądanie utworzenia trwałego woluminu (PersistentVolumeClaim)
# w celu zapewnienia, że dane bazy przetrwają restarty podów.
# =======================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: taskflow
spec:
  accessModes:
    - ReadWriteOnce # Wolumin może być montowany z prawem zapisu przez pojedynczy węzeł klastra
  resources:
    requests:
      storage: 5Gi  # Przypisanie 5 gigabajtów przestrzeni dyskowej na dane SQL

