apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: taskflow
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: taskflow-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: apiport
          envFrom:
            - configMapRef:
                name: taskflow-config
            - secretRef:
                name: taskflow-secrets
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
