# =======================================================
# hpa.yaml - Automatyczne skalowanie horyzontalne podów (HPA)
#
# Mechanizm automatycznego zwiększania lub zmniejszania liczby
# replik kontenera API na podstawie obciążenia procesora.
# =======================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: taskflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api         # Cel skalowania: wdrożenie o nazwie api
  minReplicas: 2      # Minimalna liczba replik podów w klastrze
  maxReplicas: 5      # Maksymalna dopuszczalna liczba replik podów
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Skaluj w górę, jeśli średnie zużycie CPU przekroczy 70%

