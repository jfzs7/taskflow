# =======================================================
# secrets.yaml - Poufne dane i poświadczenia klastra
#
# Przechowywanie danych wrażliwych (hasła, loginy).
# Wartości w polu 'data' muszą być zakodowane w Base64.
# Odszyfrowanie w powłoce: echo -n "wartosc" | base64
# =======================================================
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
  namespace: taskflow
type: Opaque # Typ domyślny dla ogólnych sekretów (klucz-wartość)
data:
  # Dane zakodowane w standardzie Base64 (bezpieczeństwo konfiguracji)
  POSTGRES_USER: dGFza2Zsb3dfdXNlcg==         # Odpowiednik jawny: taskflow_user
  POSTGRES_PASSWORD: dGFza2Zsb3dfc2VjcmV0X3Bhc3N3b3Jk # Odpowiednik jawny: taskflow_secret_password
  REDIS_PASSWORD: "" # Brak hasła dla instancji Redis deweloperskiej

