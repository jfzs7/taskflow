# =======================================================
# grafana.yaml - Wdrożenie i automatyczna konfiguracja Grafany
#
# Panel graficzny Grafana połączony z bazą danych Prometheus.
# =======================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: taskflow
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-svc:9090/prometheus # DNS serwisu Prometheus w klastrze
        isDefault: true
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: taskflow
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
              name: webport
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin" # Domyślne hasło administratora Grafany
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true" # Zezwolenie na anonimowe logowanie w celach prezentacji
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_SERVER_ROOT_URL
              value: "http://taskflow.local/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: datasource-volume
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yaml
              subPath: dashboard-provider.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
      volumes:
        - name: datasource-volume
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: taskflow
spec:
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
  selector:
    app: grafana
  type: NodePort # NodePort pozwala na wejście do panelu Grafana z przeglądarki
