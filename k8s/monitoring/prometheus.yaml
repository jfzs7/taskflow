# =======================================================
# prometheus.yaml - Konfiguracja i wdrożenie Prometheus
#
# Serwer Prometheus odpowiada za okresowe pobieranie (scraping)
# metryk z endpointu /prometheus w aplikacji API.
# =======================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: taskflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s # Pobieraj metryki co 5 sekund w celach demonstracyjnych
      evaluation_interval: 5s

    rule_files:
      - /etc/prometheus/rules.yml

    scrape_configs:
      - job_name: 'taskflow-api'
        metrics_path: '/prometheus' # Ścieżka do metryk w naszej aplikacji
        static_configs:
          - targets: ['api-svc:8000'] # DNS serwisu API w klastrze
  rules.yml: |
    groups:
      - name: taskflow_alerts
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[1m]) > 0.05
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: High HTTP Error Rate
              description: "Więcej niż 5% zapytań kończy się błędem 5xx w ciągu ostatniej minuty."
          - alert: InstanceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: API Instance Down
              description: "Instancja api-svc nie odpowiada od 1 minuty."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: taskflow
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.1
          ports:
            - containerPort: 9090
              name: webport
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.external-url=http://taskflow.local/prometheus"
            - "--web.route-prefix=/prometheus"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config-volume
              mountPath: /etc/prometheus/rules.yml
              subPath: rules.yml
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: taskflow
spec:
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  selector:
    app: prometheus
  type: NodePort # NodePort pozwala na wejście do panelu Prometheus z przeglądarki
