# =======================================================
# pvc.yaml - Trwały wolumin dla pamięci podręcznej Redis
#
# Żądanie utworzenia PersistentVolumeClaim o rozmiarze 1Gi.
# Przeznaczony na zapisywanie zrzutów pamięci Redis (dane AOF/RDB).
# =======================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: taskflow
spec:
  accessModes:
    - ReadWriteOnce # Dostęp z prawami zapisu/odczytu dla jednego węzła
  resources:
    requests:
      storage: 1Gi  # 1 gigabajt na dane cache (wystarczający dla deweloperskiej bazy)

