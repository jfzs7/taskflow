# =======================================================
# configmap.yaml - Konfiguracja serwera Nginx w klastrze
#
# Przechowywanie pliku konfiguracyjnego nginx.conf.
# Pozwala to na modyfikowanie reguł proxy bez przebudowy obrazu.
# =======================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: taskflow
data:
  nginx.conf: |
    # Definicja backendu jako upstream z DNS klastra (api-svc)
    upstream api_backend {
        server api-svc:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Ścieżki do logów
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Nagłówki HTTP do zachowania informacji o oryginalnym kliencie
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Limity czasowe dla połączeń proxy
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Przekazywanie całego ruchu do API FastAPI
        location / {
            proxy_pass http://api_backend;
        }

        # Punkt kontrolny zdrowia Nginxa (wykorzystywany przez sondy K8s)
        location /nginx-health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        client_max_body_size 10M; # Limit wielkości przesyłanego pliku (np. załączniki)
        
        # Włączenie kompresji gzip w celu oszczędzania transferu sieciowego
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
        gzip_min_length 1000;
    }

